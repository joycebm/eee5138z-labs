services:
  jupyterhub:
    image: jupyterhub/jupyterhub:4.1
    container_name: jupyterhub
    restart: always
    ports:
      - "${JH_PORT}:8000"
    volumes:
      - ./jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
