- name: Install k3s server (Traefik enabled for Ingress)
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -s - server \
      --write-kubeconfig-mode 644 \
      --cluster-cidr "{{ k3s_cluster_cidr }}" \
      --service-cidr "{{ k3s_service_cidr }}" \
      {% if k3s_disable_servicelb %} --disable servicelb {% endif %}
  args:
    creates: /usr/local/bin/k3s

- name: Read k3s node token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token

- name: Set fact with decoded token
  ansible.builtin.set_fact:
    k3s_node_token_decoded: "{{ k3s_token.content | b64decode | trim }}"
