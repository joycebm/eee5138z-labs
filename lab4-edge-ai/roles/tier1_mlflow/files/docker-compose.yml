services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    container_name: mlflow
    restart: always
    ports:
      - "${MLFLOW_PORT}:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/backend/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --serve-artifacts
    volumes:
      - ./backend:/mlflow/backend
      - ./artifacts:/mlflow/artifacts
