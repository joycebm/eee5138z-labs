- name: Ensure Tier-0 manifest directory exists
  ansible.builtin.file:
    path: /opt/digitafrica/k8s-tier0
    state: directory
    mode: "0755"

- name: Render Tier-0 namespace manifest
  ansible.builtin.template:
    src: 00-namespace.yaml.j2
    dest: /opt/digitafrica/k8s-tier0/00-namespace.yaml
    mode: "0644"

- name: Render Tier-0 Jupyter manifest
  ansible.builtin.template:
    src: 10-jupyter-single.yaml.j2
    dest: /opt/digitafrica/k8s-tier0/10-jupyter-single.yaml
    mode: "0644"

- name: Render Tier-0 model-cache manifest
  ansible.builtin.template:
    src: 20-model-cache.yaml.j2
    dest: /opt/digitafrica/k8s-tier0/20-model-cache.yaml
    mode: "0644"

- name: Apply Tier-0 namespace
  ansible.builtin.shell: |
    set -e
    k3s kubectl apply -f /opt/digitafrica/k8s-tier0/00-namespace.yaml
  args:
    executable: /bin/bash

- name: Apply Tier-0 Jupyter
  ansible.builtin.shell: |
    set -e
    k3s kubectl apply -f /opt/digitafrica/k8s-tier0/10-jupyter-single.yaml
  args:
    executable: /bin/bash

- name: Apply Tier-0 model-cache (optional)
  ansible.builtin.shell: |
    set -e
    k3s kubectl apply -f /opt/digitafrica/k8s-tier0/20-model-cache.yaml
  args:
    executable: /bin/bash
  when: tier0_enable_modelcache | default(true) | bool

- name: Validate Tier-0 manifests (server-side)
  ansible.builtin.shell: |
    set -e
    k3s kubectl apply --dry-run=server -f /opt/digitafrica/k8s-tier0/00-namespace.yaml
    k3s kubectl apply --dry-run=server -f /opt/digitafrica/k8s-tier0/10-jupyter-single.yaml
    if {{ (tier0_enable_modelcache | default(true)) | bool | ternary('true','false') }}; then
      k3s kubectl apply --dry-run=server -f /opt/digitafrica/k8s-tier0/20-model-cache.yaml
    fi
  args:
    executable: /bin/bash


- name: Wait for Tier-0 Jupyter deployment rollout
  ansible.builtin.shell: |
    set -e
    k3s kubectl -n {{ digitafrica_namespace }} rollout status deploy/tier0-jupyter --timeout=300s
  args:
    executable: /bin/bash

- name: Wait for Tier-0 model-cache deployment rollout (optional)
  ansible.builtin.shell: |
    set -e
    k3s kubectl -n {{ digitafrica_namespace }} rollout status deploy/model-cache --timeout=300s
  args:
    executable: /bin/bash
  when: tier0_enable_modelcache | default(true) | bool

- name: Get Jupyter NodePort
  ansible.builtin.shell: |
    set -e
    k3s kubectl -n {{ digitafrica_namespace }} get svc tier0-jupyter \
      -o jsonpath='{.spec.ports[?(@.name=="http")].nodePort}'
  args:
    executable: /bin/bash
  register: jupyter_nodeport
  changed_when: false

- name: Get model-cache NodePort (optional)
  ansible.builtin.shell: |
    set -e
    k3s kubectl -n {{ digitafrica_namespace }} get svc model-cache \
      -o jsonpath='{.spec.ports[?(@.name=="http")].nodePort}'
  args:
    executable: /bin/bash
  register: modelcache_nodeport
  changed_when: false
  when: tier0_enable_modelcache | default(true) | bool


- name: Stage seed notebooks on Tier-0 node
  ansible.builtin.copy:
    src: files/notebooks/
    dest: /opt/digitafrica/seed-notebooks/
    mode: "0644"
 
