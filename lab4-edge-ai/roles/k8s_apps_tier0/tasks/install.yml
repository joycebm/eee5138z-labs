- name: Copy notebooks from host into Tier-0 Jupyter PVC
  ansible.builtin.shell: |
    set -euo pipefail
    POD=$(k3s kubectl -n {{ digitafrica_namespace }} get pod -l app=tier0-jupyter -o jsonpath='{.items[0].metadata.name}')

    # Copy seed notebooks directory into the pod
    k3s kubectl -n {{ digitafrica_namespace }} cp /opt/digitafrica/seed-notebooks "$POD":/home/jovyan/

    # Move notebooks into final location, install deps, then clean up
    k3s kubectl -n {{ digitafrica_namespace }} exec "$POD" -- bash -lc '
      set -e
      mkdir -p /home/jovyan/digitafrica

      mv /home/jovyan/seed-notebooks/* /home/jovyan/digitafrica/

      pip install --no-cache-dir -r /home/jovyan/digitafrica/requirements.txt

      # cleanup temporary folder
      rm -rf /home/jovyan/seed-notebooks
    '
  args:
    executable: /bin/bash


- name: Show Tier-0 access URLs (NodePort)
  ansible.builtin.debug:
    msg:
      - "Jupyter URL:     http://{{ ansible_host | default(inventory_hostname) }}:{{ jupyter_nodeport.stdout }}"
      - "Model-cache URL: http://{{ ansible_host | default(inventory_hostname) }}:{{ modelcache_nodeport.stdout | default('') }}"